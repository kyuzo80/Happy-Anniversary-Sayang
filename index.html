<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Anniversary ❤️</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
      min-height:100dvh;
      overflow-x:hidden;
      color:black;
      text-align:center;
      position:relative;
    }

    h1, h2, p{
      color:black;
    }

    .hidden{
      display:none;
    }

    /* Opening Screen */
    #opening-screen{
      min-height:100dvh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .open-box{
      background:white;
      color:#ff4d6d;
      padding:40px;
      border-radius:20px;
      cursor:pointer;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      transition:0.3s ease;
      width:300px;
    }

    .open-box:hover{
      transform:scale(1.05);
    }

    .open-box h1{
      margin-bottom:10px;
      font-size:2rem;
      color:#ff4d6d;
    }

    /* Main Content */
    #main-content{
      padding:30px 20px 60px;
      animation:fadeIn 1s ease;
      position:relative;
      z-index:2;
    }

    .title{
      font-size:2.7rem;
      margin-bottom:25px;
    }

    .countdown-box,
    .letter-box,
    .photo-section{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      padding:25px;
      border-radius:20px;
      margin:20px auto;
      max-width:700px;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .countdown-box h2,
    .letter-box h2,
    .photo-section h2{
      margin-bottom:15px;
    }

    .countdown-box p{
      font-size:1.2rem;
      font-weight:600;
    }

    .letter-box p{
      line-height:1.9;
      font-size:1rem;
    }

    /* Photos */
    .photos{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .photos img{
      width:280px;
      height:350px;
      object-fit:cover;
      border-radius:20px;
      border:4px solid white;
      box-shadow:0 10px 20px rgba(0,0,0,0.2);
      transition:0.3s ease;
      background:white;
    }

    .photos img:hover{
      transform:scale(1.05);
    }

    /* Music */
    audio{
      margin-top:30px;
      width:min(300px, 90%);
    }

    /* Floating Hearts */
    .hearts{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:1;
    }

    .heart{
      position:absolute;
      top:-10vh;
      animation-name:fall;
      animation-timing-function:linear;
      animation-fill-mode:forwards;
      user-select:none;
      will-change:transform;
    }

    @keyframes fall{
      from{
        transform:
          translateY(-10vh)
          rotate(0deg);
      }

      to{
        transform:
          translateY(120vh)
          rotate(360deg);
      }
    }

    @media(max-width:768px){

      .title{
        font-size:2rem;
      }

      .open-box{
        width:100%;
        max-width:320px;
      }

      .photos img{
        width:90%;
        height:auto;
      }

      .letter-box p{
        font-size:0.95rem;
      }
    }
  </style>
</head>
